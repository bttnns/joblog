# Builds release binaries for macOS (Intel + Apple Silicon) and Linux
# (amd64 + arm64) and publishes them as a GitHub Release whenever a
# v* tag is pushed. Can also be run manually via workflow_dispatch.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version
        id: version
        run: echo "version=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build release archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          ldflags="-s -w -X github.com/bttnns/joblog/internal/cli.Version=${VERSION}"
          targets="darwin/amd64 darwin/arm64 linux/amd64 linux/arm64"
          for target in $targets; do
            os="${target%/*}"
            arch="${target#*/}"
            echo "Building ${os}/${arch}"
            workdir="$(mktemp -d)"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "$ldflags" -o "$workdir/jl" ./cmd/jl
            cp LICENSE README.md "$workdir/"
            archive="jl_${VERSION}_${os}_${arch}.tar.gz"
            tar -czf "dist/${archive}" -C "$workdir" jl LICENSE README.md
            rm -rf "$workdir"
          done
          ( cd dist && sha256sum *.tar.gz > checksums.txt )
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
