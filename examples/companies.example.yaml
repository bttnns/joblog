# Example company list for jl. Copy to your private data dir as data/companies.yaml
# and replace these placeholders with real companies you are tracking. (Normally
# you add companies with `jl company add`, which also scaffolds a research folder.)
#
# Each company maps to the ATS (applicant tracking system) it uses, the slug a
# scraper needs, and the public careers URL (for your reference). A scraper does
# the scraping; jl imports the JSON it produces:
#
#   jobhive scrape <ats> <slug> --format json | jl role import - --company <name>
#
# Supported ats values mirror the scraper's adapters (greenhouse, ashby, lever,
# workable, workday, icims, ...). For boards a scraper cannot reach, leave `ats: custom`
# and import a browser "Copy as cURL" export instead.

companies:
  - name: acme-corp
    ats: greenhouse
    slug: acmecorp
    careers-url: https://boards.greenhouse.io/acmecorp

  - name: example-labs
    ats: ashby
    slug: examplelabs
    careers-url: https://jobs.ashbyhq.com/examplelabs

  - name: widgets-inc
    ats: lever
    slug: widgetsinc
    careers-url: https://jobs.lever.co/widgetsinc

  - name: self-hosted-co
    ats: custom
    slug: ""
    careers-url: https://example.com/careers
